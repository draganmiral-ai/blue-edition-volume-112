<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BLUE — Edition / Volume 112</title>
  <meta name="description" content="Blue Edition / Volume 112 — a quiet digital editorial photo book by Dragan Andric." />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <a class="skip-link" href="#plate-01">Skip to photographs</a>

  <div class="progress" aria-hidden="true">
    <div class="progress__bar" id="progressBar"></div>
  </div>

  <button type="button" class="return-cover" id="returnCover" aria-label="Return to cover">
    <span aria-hidden="true">&uarr;</span>
  </button>

  <header class="cover" id="cover">
    <div class="cover__field" aria-hidden="true"></div>
    <div class="cover__content">
      <h1 class="cover__word">BLUE</h1>
      <p class="cover__meta">Edition / Volume 112</p>
    </div>
    <div class="cover__cue" aria-hidden="true">
      <span class="cover__cue-line"></span>
    </div>
    <span class="visually-hidden">Scroll to begin the edition</span>
  </header>

  <main id="main">
    <section class="plate plate--01" id="plate-01" aria-labelledby="h-plate-01">
      <h2 id="h-plate-01" class="visually-hidden">Plate one</h2>
      <figure class="plate__figure">
        <picture>
          <source
            type="image/webp"
            srcset="assets/images/web/01-industrial-corridor-small.webp 720w, assets/images/web/01-industrial-corridor-large.webp 1086w"
            sizes="(max-width: 640px) 90vw, 70vw"
          />
          <img
            src="assets/images/web/01-industrial-corridor-large.jpg"
            srcset="assets/images/web/01-industrial-corridor-small.jpg 720w, assets/images/web/01-industrial-corridor-large.jpg 1086w"
            sizes="(max-width: 640px) 90vw, 70vw"
            width="1086"
            height="1448"
            alt="An underground industrial corridor with bare concrete walls, where a stainless steel cleaning cart holding mops and a bin bag stands beside a yellow caution sign, lit by a single fluorescent tube."
            loading="eager"
            fetchpriority="high"
          />
        </picture>
      </figure>
      <span class="plate__folio" aria-hidden="true">01</span>
    </section>

    <section class="plate plate--02" id="plate-02" aria-labelledby="h-plate-02">
      <h2 id="h-plate-02" class="visually-hidden">Plate two</h2>
      <span class="plate__word" aria-hidden="true">BLUE</span>
      <figure class="plate__figure">
        <picture>
          <source
            type="image/webp"
            srcset="assets/images/web/02-boutique-interior-small.webp 720w, assets/images/web/02-boutique-interior-large.webp 1122w"
            sizes="(max-width: 640px) 90vw, 60vw"
          />
          <img
            src="assets/images/web/02-boutique-interior-large.jpg"
            srcset="assets/images/web/02-boutique-interior-small.jpg 720w, assets/images/web/02-boutique-interior-large.jpg 1122w"
            sizes="(max-width: 640px) 90vw, 60vw"
            width="1122"
            height="1402"
            alt="A dim retail lounge interior at night, with red and blue shirts and caps displayed on a backlit shelving unit behind a grey sofa; a wooden coffee table holds a vase of dried flowers, a yellow notebook, and magazines."
            loading="lazy"
          />
        </picture>
      </figure>
      <span class="plate__folio" aria-hidden="true">02</span>
    </section>

    <section class="plate plate--03" id="plate-03" aria-labelledby="h-plate-03">
      <h2 id="h-plate-03" class="visually-hidden">Plate three</h2>
      <figure class="plate__figure">
        <picture>
          <source
            type="image/webp"
            srcset="assets/images/web/03-handwritten-blessing-small.webp 720w, assets/images/web/03-handwritten-blessing-large.webp 1086w"
            sizes="(max-width: 640px) 80vw, 40vw"
          />
          <img
            src="assets/images/web/03-handwritten-blessing-large.jpg"
            srcset="assets/images/web/03-handwritten-blessing-small.jpg 720w, assets/images/web/03-handwritten-blessing-large.jpg 1086w"
            sizes="(max-width: 640px) 80vw, 40vw"
            width="1086"
            height="1448"
            alt="A hand holds a small handwritten note card reading Stay Strong against a light-coloured car seat, with a blue-ink message and a drawn heart."
            loading="lazy"
          />
        </picture>
      </figure>
      <p class="plate__blessing">May today give you nothing but a day full of blessing&hellip;</p>
      <span class="plate__folio" aria-hidden="true">03</span>
    </section>

    <section class="plate plate--04" id="plate-04" aria-labelledby="h-plate-04">
      <h2 id="h-plate-04" class="visually-hidden">Plate four</h2>
      <span class="plate__fragment" aria-hidden="true">BLUE</span>
      <figure class="plate__figure">
        <picture>
          <source
            type="image/webp"
            srcset="assets/images/web/04-blue-envelope-small.webp 720w, assets/images/web/04-blue-envelope-large.webp 1122w"
            sizes="(max-width: 640px) 80vw, 45vw"
          />
          <img
            src="assets/images/web/04-blue-envelope-large.jpg"
            srcset="assets/images/web/04-blue-envelope-small.jpg 720w, assets/images/web/04-blue-envelope-large.jpg 1122w"
            sizes="(max-width: 640px) 80vw, 45vw"
            width="1122"
            height="1402"
            alt="A bright blue blank envelope rests atop a burgundy crocodile-embossed laptop sleeve on a white desk."
            loading="lazy"
          />
        </picture>
      </figure>
      <span class="plate__folio" aria-hidden="true">04</span>
    </section>

    <section class="plate plate--05" id="plate-05" aria-labelledby="h-plate-05">
      <h2 id="h-plate-05" class="visually-hidden">Plate five</h2>
      <figure class="plate__figure">
        <picture>
          <source
            type="image/webp"
            srcset="assets/images/web/05-the-fountains-small.webp 720w, assets/images/web/05-the-fountains-large.webp 1024w"
            sizes="(max-width: 640px) 90vw, 65vw"
          />
          <img
            src="assets/images/web/05-the-fountains-large.jpg"
            srcset="assets/images/web/05-the-fountains-small.jpg 720w, assets/images/web/05-the-fountains-large.jpg 1024w"
            sizes="(max-width: 640px) 90vw, 65vw"
            width="1024"
            height="1536"
            alt="A tall cobalt blue column labelled The Fountains stands at the centre of a glossy marble shopping mall atrium beneath angled skylights."
            loading="lazy"
          />
        </picture>
      </figure>
      <span class="plate__folio" aria-hidden="true">05</span>
    </section>
  </main>

  <footer class="colophon">
    <p class="colophon__credit">Blue Edition / Volume 112 &mdash; Dragan Andric</p>
    <p class="colophon__year">&copy; <span id="year">2026</span></p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
